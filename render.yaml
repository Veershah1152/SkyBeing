services:
  - type: web
    name: skybeing-backend
    runtime: node
    region: singapore          # closest to India — change to 'ohio' or 'oregon' if preferred
    plan: free                 # upgrade to 'starter' for always-on

    rootDir: backend           # Render builds from the /backend folder

    buildCommand: npm install
    startCommand: npm start

    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production

      # ── MongoDB ──────────────────────────────────────────────────────────
      - key: MONGODB_URI
        sync: false            # fill this in manually on Render dashboard

      # ── CORS ─────────────────────────────────────────────────────────────
      - key: CORS_ORIGIN
        sync: false            # set to your Vercel/Netlify frontend URL

      # ── JWT ──────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 1d

      # ── Cloudinary ───────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Google OAuth ─────────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── Razorpay ─────────────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
