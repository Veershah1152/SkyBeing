<!doctype html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y6SJEH301S"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Y6SJEH301S');
  </script>

  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo-cropped.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Discover premium bird feeders, bird houses, and water feeders at SkyBeings. Create a sanctuary for birds in your garden today." />
  <meta name="google-site-verification" content="uI4_dK1FNBZbZXNlkzdJaYj2qXXlAzNX-PQhSatIJZI" />
  <title>SkyBeings</title>

  <!--
    ── Critical Resource Hints ──────────────────────────────────────────────
    preconnect: open TCP+TLS to these origins during HTML parse, BEFORE JS runs.
    This eliminates DNS lookup + handshake delay for the LCP banner image and API.
  -->
  <!-- 
    ── Critical API Preloads ──────────────────────────────────────────────
    These tell the browser to start fetching data IMMEDIATELY upon seeing the HTML,
    before main.jsx even downloads. This eliminates the "JS Gap" where the browser
    is waiting for script parse/execution before knowing it needs banners.
  -->
  <link rel="preload" href="/api/v1/banners/active?page=home" as="fetch" crossorigin="use-credentials" />
  <link rel="preload" href="/api/v1/settings/maintenance" as="fetch" crossorigin="use-credentials" />

  <script>
    (function () {
      try {
        var token = localStorage.getItem('accessToken');
        var headers = {};
        if (token) {
          headers['Authorization'] = 'Bearer ' + token;
        }
        window.__USER_PRELOAD__ = fetch('/api/v1/users/me', {
          headers: headers,
          credentials: 'include'
        }).then(function (res) {
          return res.json();
        }).catch(function () {
          return null;
        });
      } catch (e) {
        // Fallback for cookie/localStorage restriction settings
      }
    })();
  </script>

  <!-- Cloudinary: where all banner/product images are hosted -->
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- 
    ── Deferred Third-Party Analytics & Tracking ─────────────────────────────
    Lightweight stubs are defined synchronously to prevent React from throwing errors.
    The actual heavy scripts are loaded only after the first user interaction (or a 4s fallback timeout)
    to free up the CPU main thread during initial page load and improve FCP/LCP.
  -->
  <script>
    // 1. Data Layer and Google Ads stubs
    window.dataLayer = window.dataLayer || [];
    window.gtag = window.gtag || function () { dataLayer.push(arguments); };

    // 2. Meta Pixel stub
    window.fbq = function () {
      if (window.fbq.callMethod) {
        window.fbq.callMethod.apply(window.fbq, arguments);
      } else {
        window.fbq.queue.push(arguments);
      }
    };
    window.fbq.push = window.fbq;
    window.fbq.loaded = true;
    window.fbq.version = '2.0';
    window.fbq.queue = [];

    // 3. Lazy script loader
    (function () {
      var initialized = false;

      function initThirdParty() {
        if (initialized) return;
        initialized = true;

        // Cleanup event listeners
        events.forEach(function (e) {
          window.removeEventListener(e, initThirdParty, { passive: true });
        });
        clearTimeout(timeoutId);

        // Load GTM
        (function (w, d, s, l, i) {
          w[l] = w[l] || []; w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
          var f = d.getElementsByTagName(s)[0], j = d.createElement(s),
            dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true;
          j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
          f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-W3WQH94D');

        // Google Analytics script is loaded statically in the <head> to satisfy GSC/GA detection.

        // Load Google Ads script
        var adsId = '%VITE_GOOGLE_ADS_ID%';
        if (adsId && adsId !== '%VITE_GOOGLE_ADS_ID%') {
          var adsScript = document.createElement('script');
          adsScript.async = true;
          adsScript.src = 'https://www.googletagmanager.com/gtag/js?id=' + adsId;
          document.head.appendChild(adsScript);
          window.gtag('config', adsId);
        }

        // Load Meta Pixel script
        var pixelScript = document.createElement('script');
        pixelScript.async = true;
        pixelScript.src = 'https://connect.facebook.net/en_US/fbevents.js';
        document.head.appendChild(pixelScript);
        window.fbq('init', '298502654348777');
        window.fbq('track', 'PageView');
      }

      var events = ['scroll', 'click', 'mousemove', 'touchstart', 'keydown'];
      events.forEach(function (e) {
        window.addEventListener(e, initThirdParty, { once: true, passive: true });
      });

      // Fallback: load after 4 seconds of idle time if no interaction occurs
      var timeoutId = setTimeout(initThirdParty, 4000);
    })();
  </script>
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-W3WQH94D" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>
  <!-- Meta Pixel noscript fallback -->
  <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=298502654348777&ev=PageView&noscript=1" /></noscript>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
