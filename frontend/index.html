  <!--
    ── Path-aware API Preloads ────────────────────────────────────────────
    Banners + maintenance are ONLY needed on storefront pages (home, shop, collections).
    Preloading them on /login or /admin wastes bandwidth and triggers browser warnings
    ("preloaded but not used within a few seconds"). The inline script below checks
    the current path before injecting the <link rel=preload> tags.
  -->
  <script>
    (function () {
      var path = window.location.pathname;
      var isStorefront = path === '/' ||
        path.startsWith('/collections') ||
        path.startsWith('/shop') ||
        path.startsWith('/product') ||
        path.startsWith('/blogs') ||
        path.startsWith('/gallery') ||
        path.startsWith('/about') ||
        path.startsWith('/contact') ||
        path.startsWith('/bulk-orders') ||
        path.startsWith('/dogs');
      if (isStorefront) {
        var head = document.head;
        // Preload banners for current page
        var pageKey = (path === '/' || path === '') ? 'home' : 'shop';
        var bl = document.createElement('link');
        bl.rel = 'preload'; bl.as = 'fetch';
        bl.href = '/api/v1/banners/active?page=' + pageKey;
        bl.setAttribute('crossorigin', 'use-credentials');
        head.appendChild(bl);
        // Preload maintenance setting
        var ml = document.createElement('link');
        ml.rel = 'preload'; ml.as = 'fetch';
        ml.href = '/api/v1/settings/maintenance';
        ml.setAttribute('crossorigin', 'use-credentials');
        head.appendChild(ml);
      }
    })();
  </script>

  <script>
    (function () {
      try {
        var token = localStorage.getItem('accessToken');
        var headers = {};
        if (token) {
          headers['Authorization'] = 'Bearer ' + token;
        }
        window.__USER_PRELOAD__ = fetch('/api/v1/users/me', {
          headers: headers,
          credentials: 'include'
        }).then(function (res) {
          return res.json();
        }).catch(function () {
          return null;
        });
      } catch (e) {
        // Fallback for cookie/localStorage restriction settings
      }
    })();
  </script>
