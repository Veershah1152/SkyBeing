name = "skybeings-backend"
main = "src/worker-index.js"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env", "no_handle_cross_request_promise_resolution"]

[vars]
NODE_ENV = "production"
CORS_ORIGIN = "https://skybeings.in,https://www.skybeings.in,https://skybeing.pages.dev"
UPLOAD_PROVIDER = "cloudinary"
JWT_EXPIRY = "1d"
CLOUDFLARE_R2_ENDPOINT = "https://<ACCOUNT_ID>.r2.cloudflarestorage.com"
CLOUDFLARE_R2_BUCKET_NAME = "<YOUR_BUCKET_NAME>"
CLOUDFLARE_R2_PUBLIC_URL = "https://<YOUR_BUCKET_PUBLIC_URL>"
GOOGLE_CLIENT_ID = "<YOUR_GOOGLE_CLIENT_ID>"
RAZORPAY_KEY_ID = "<YOUR_RAZORPAY_KEY_ID>"
SHIPROCKET_EMAIL = "<YOUR_SHIPROCKET_EMAIL>"
CLOUDINARY_CLOUD_NAME = "<YOUR_CLOUDINARY_CLOUD_NAME>"
CLOUDINARY_API_KEY = "<YOUR_CLOUDINARY_API_KEY>"
ADMIN_SECURITY_PASSWORD = "<YOUR_ADMIN_SECURITY_PASSWORD>"

# Restored environment configuration
MONGODB_URI = "<YOUR_MONGODB_URI>"
JWT_SECRET = "<YOUR_JWT_SECRET>"
GOOGLE_CLIENT_SECRET = "<YOUR_GOOGLE_CLIENT_SECRET>"
RAZORPAY_KEY_SECRET = "<YOUR_RAZORPAY_KEY_SECRET>"
RAZORPAY_WEBHOOK_SECRET = "<YOUR_RAZORPAY_WEBHOOK_SECRET>"
SHIPROCKET_PASSWORD = "<YOUR_SHIPROCKET_PASSWORD>"
CLOUDINARY_API_SECRET = "<YOUR_CLOUDINARY_API_SECRET>"
CLOUDFLARE_R2_ACCESS_KEY_ID = "<YOUR_R2_ACCESS_KEY_ID>"
CLOUDFLARE_R2_SECRET_ACCESS_KEY = "<YOUR_R2_SECRET_ACCESS_KEY>"

